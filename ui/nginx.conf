worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths writable by the non-root nginx user
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile       on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain application/json application/javascript
               text/css application/xml image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root  /usr/share/nginx/html;
        index index.html;

        # Long-lived cache for hashed static assets (JS/CSS bundles)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # React Router — fall back to index.html for all unmatched paths
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
