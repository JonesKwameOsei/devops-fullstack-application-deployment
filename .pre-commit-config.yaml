repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: debug-statements

  - repo: local
    hooks:
      - id: pyright
        name: pyright (api)
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
        args: ["--project", "api/pyrightconfig.json", "api/"]

      - id: eslint
        name: eslint (ui)
        entry: bash -c 'cd ui && node_modules/.bin/eslint src/ --max-warnings 0'
        language: system
        files: ^ui/src/.*\.(js|jsx)$
        pass_filenames: false
