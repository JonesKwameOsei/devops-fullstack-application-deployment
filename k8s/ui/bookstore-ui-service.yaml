apiVersion: v1
kind: Service
metadata:
  name: bookstore-ui
  namespace: bookstore
  labels:
    app: bookstore-ui
    component: frontend
spec:
  selector:
    app: bookstore-ui
  # LoadBalancer lets MetalLB assign an IP from its address pool (homelab gateway: 192.168.1.221)
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
